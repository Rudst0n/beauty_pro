<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ company.name }} | Catálogo Inteligente</title>
  <meta name="description" content="{{ company.description or 'Catálogo de produtos, serviços e atendimento pelo WhatsApp.' }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/public.css') }}">
  <style>
    :root { --brand: {{ company.primary_color }}; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
  <a class="whatsapp-float" href="{{ url_for('public.track_whatsapp', company_slug=company.slug) }}" aria-label="Falar pelo WhatsApp">WhatsApp</a>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
