<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ company.name }} | Catálogo profissional</title>
  <meta name="description" content="{{ company.description or 'Catálogo de produtos, serviços e atendimento pelo WhatsApp.' }}">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/public.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>

{% set brand_color = company.primary_color or '#111827' %}
{% set secondary_color = company.secondary_color or '#b08d57' %}
{% set business_type = company.business_type or 'beauty' %}

<body class="theme-{{ business_type }}" style="
  --brand: {{ brand_color }};
  --brand-dark: color-mix(in srgb, {{ brand_color }} 82%, #000000);
  --brand-soft: color-mix(in srgb, {{ brand_color }} 10%, #ffffff);
  --secondary: {{ secondary_color }};
  --secondary-soft: color-mix(in srgb, {{ secondary_color }} 14%, #ffffff);
">
  {% block content %}{% endblock %}

  <a class="whatsapp-float" href="{{ url_for('public.track_whatsapp', company_slug=company.slug) }}" aria-label="Falar pelo WhatsApp">
    WhatsApp
  </a>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
