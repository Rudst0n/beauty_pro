<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ company.name }} | Catálogo profissional</title>
  <meta name="description" content="{{ company.description or 'Catálogo de produtos, serviços e atendimento pelo WhatsApp.' }}">

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/public.css') }}">
</head>

{% set brand_color = company.primary_color if company and company.primary_color else '#2f2f2f' %}

<body style="
  --brand: {{ brand_color }};
  --brand-dark: color-mix(in srgb, {{ brand_color }} 78%, #111827);
  --brand-soft: color-mix(in srgb, {{ brand_color }} 12%, #ffffff);
  --soft: color-mix(in srgb, {{ brand_color }} 5%, #ffffff);
  --soft-2: color-mix(in srgb, {{ brand_color }} 9%, #ffffff);
  --line: color-mix(in srgb, {{ brand_color }} 18%, transparent);
  --shadow: 0 24px 70px color-mix(in srgb, {{ brand_color }} 14%, transparent);
">
  {% block content %}{% endblock %}

  <a class="whatsapp-float" href="{{ url_for('public.track_whatsapp', company_slug=company.slug) }}" aria-label="Falar pelo WhatsApp">
    WhatsApp
  </a>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
