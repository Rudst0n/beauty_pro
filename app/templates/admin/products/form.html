{% extends "admin/base.html" %}

{% block content %}
<div class="page-header">
  <div>
    <span>Produtos</span>
    <h1>{{ 'Editar produto' if item else 'Novo produto' }}</h1>
  </div>
  <a href="{{ url_for('admin.products') }}" class="btn-soft">Voltar</a>
</div>

<section class="panel-card form-card">
  <form method="post" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="row g-3">
      <div class="col-md-8">
        <label>Nome do produto</label>
        <input class="form-control" name="name" value="{{ item.name if item else '' }}" required>
      </div>

      <div class="col-md-4">
        <label>Preço</label>
        <input class="form-control" name="price" type="number" step="0.01" value="{{ item.price if item and item.price else '' }}">
      </div>

      <div class="col-md-4">
        <label>Código interno ou SKU</label>
        <input class="form-control" name="sku" value="{{ item.sku if item and item.sku else '' }}" placeholder="Ex: POMADA-01">
      </div>

      <div class="col-md-4">
        <label>Quantidade em estoque</label>
        <input class="form-control" name="stock_quantity" type="number" min="0" step="1" value="{{ item.stock_quantity if item else 0 }}">
      </div>

      <div class="col-md-4">
        <label>Alerta de estoque baixo</label>
        <input class="form-control" name="low_stock_alert" type="number" min="0" step="1" value="{{ item.low_stock_alert if item else 3 }}">
      </div>

      <div class="col-12">
        <label>Descrição</label>
        <textarea class="form-control" name="description" rows="4">{{ item.description if item else '' }}</textarea>
      </div>

      <div class="col-md-6">
        <label>Foto</label>
        <input class="form-control" name="image" type="file" accept=".png,.jpg,.jpeg,.webp">
        {% if item and item.image %}
          <small>Imagem atual: {{ item.image }}</small>
        {% endif %}
      </div>

      <div class="col-md-2 check-col">
        <label>
          <input type="checkbox" name="is_available" {% if not item or item.is_available %}checked{% endif %}>
          Disponível
        </label>
      </div>

      <div class="col-md-2 check-col">
        <label>
          <input type="checkbox" name="is_featured" {% if item and item.is_featured %}checked{% endif %}>
          Destaque
        </label>
      </div>

      <div class="col-md-2 check-col">
        <label>
          <input type="checkbox" name="track_stock" {% if item and item.track_stock %}checked{% endif %}>
          Controlar estoque
        </label>
      </div>
    </div>

    <button class="btn-primary-custom mt-4" type="submit">Salvar produto</button>
  </form>
</section>
{% endblock %}
