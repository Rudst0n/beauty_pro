{% extends "admin/base.html" %}

{% block content %}
<div class="page-header">
  <div>
    <span>Serviços</span>
    <h1>{{ 'Editar serviço' if item else 'Novo serviço' }}</h1>
  </div>
  <a href="{{ url_for('admin.services') }}" class="btn-soft">Voltar</a>
</div>

<section class="panel-card form-card">
  <form method="post" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="row g-3">
      <div class="col-md-6">
        <label>Nome do serviço</label>
        <input class="form-control" name="name" value="{{ item.name if item else '' }}" required>
      </div>

      <div class="col-md-3">
        <label>Preço inicial</label>
        <input class="form-control" name="price_from" type="number" step="0.01" value="{{ item.price_from if item and item.price_from else '' }}">
      </div>

      <div class="col-md-3">
        <label>Duração</label>
        <input class="form-control" name="duration" value="{{ item.duration if item else '' }}" placeholder="Ex: 2h">
      </div>

      <div class="col-12">
        <label>Descrição</label>
        <textarea class="form-control" name="description" rows="4">{{ item.description if item else '' }}</textarea>
      </div>

      <div class="col-md-6">
        <label>Foto</label>
        <input class="form-control" name="image" type="file" accept=".png,.jpg,.jpeg,.webp">
        {% if item and item.image %}
          <small>Imagem atual: {{ item.image }}</small>
        {% endif %}
      </div>

      <div class="col-md-3 check-col">
        <label>
          <input type="checkbox" name="is_active" {% if not item or item.is_active %}checked{% endif %}>
          Ativo
        </label>
      </div>

      <div class="col-md-3 check-col">
        <label>
          <input type="checkbox" name="is_featured" {% if item and item.is_featured %}checked{% endif %}>
          Destaque
        </label>
      </div>
    </div>

    <button class="btn-primary-custom mt-4" type="submit">Salvar serviço</button>
  </form>
</section>
{% endblock %}
